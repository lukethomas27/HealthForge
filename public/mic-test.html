<!DOCTYPE html>
<html>
<head>
  <title>Microphone Test</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    #status { padding: 12px; border-radius: 8px; margin: 16px 0; font-weight: bold; }
    .listening { background: #fef2f2; color: #dc2626; }
    .idle { background: #f0fdf4; color: #16a34a; }
    .error { background: #fefce8; color: #ca8a04; }
    #output { white-space: pre-wrap; background: #f3f4f6; padding: 16px; border-radius: 8px; min-height: 100px; margin-top: 16px; font-family: monospace; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; color: white; background: #0B1929; margin-right: 8px; }
    button:hover { opacity: 0.9; }
    #log { margin-top: 20px; font-size: 12px; color: #666; white-space: pre-wrap; background: #fafafa; padding: 12px; border-radius: 8px; max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>🎤 Microphone & Speech API Test</h1>

  <div>
    <strong>Browser:</strong> <span id="browser"></span><br>
    <strong>SpeechRecognition API:</strong> <span id="apiCheck"></span><br>
    <strong>Protocol:</strong> <span id="protocol"></span>
  </div>

  <div id="status" class="idle">Ready — click Start to begin</div>

  <button onclick="startListening()">▶ Start Listening</button>
  <button onclick="stopListening()">⏹ Stop</button>

  <h3>Transcription Output:</h3>
  <div id="output">(speak and your words will appear here)</div>

  <h3>Debug Log:</h3>
  <div id="log"></div>

  <script>
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const logEl = document.getElementById('log');
    let recognition = null;
    let fullTranscript = '';
    let keepListening = false;
    let restartCount = 0;

    function log(msg) {
      const ts = new Date().toLocaleTimeString();
      logEl.textContent += `[${ts}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    // Check environment
    document.getElementById('browser').textContent = navigator.userAgent.split(' ').pop();
    document.getElementById('protocol').textContent = location.protocol + '//' + location.host;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      document.getElementById('apiCheck').textContent = '✅ Available';
      log('SpeechRecognition API is available');
    } else {
      document.getElementById('apiCheck').textContent = '❌ NOT available — use Chrome!';
      log('ERROR: SpeechRecognition API is NOT available in this browser');
    }

    function createAndStart() {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onstart = () => {
        log('✅ recognition.onstart — LISTENING');
        status.textContent = '🔴 Listening... speak now!';
        status.className = 'listening';
      };

      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          const transcript = event.results[i][0].transcript;
          const confidence = event.results[i][0].confidence;
          if (event.results[i].isFinal) {
            fullTranscript += transcript + ' ';
            log(`FINAL: "${transcript}" (${(confidence * 100).toFixed(1)}%)`);
          } else {
            interim += transcript;
          }
        }
        output.textContent = fullTranscript + (interim ? '\n[hearing: ' + interim + ']' : '');
      };

      recognition.onerror = (event) => {
        log(`❌ ERROR: ${event.error}`);
        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
          keepListening = false;
          status.textContent = `Mic blocked! Check browser permissions.`;
          status.className = 'error';
        }
      };

      recognition.onend = () => {
        log('onend fired');
        if (keepListening) {
          restartCount++;
          log(`Auto-restarting... (restart #${restartCount})`);
          status.textContent = `🔴 Listening (auto-restart #${restartCount})...`;
          setTimeout(() => {
            if (keepListening) {
              createAndStart();
            }
          }, 250);
        } else {
          status.textContent = 'Stopped';
          status.className = 'idle';
        }
      };

      recognition.onspeechstart = () => log('onspeechstart — speech detected!');
      recognition.onaudiostart = () => log('onaudiostart — mic active');

      try {
        recognition.start();
        log('recognition.start() called');
      } catch (e) {
        log(`ERROR: ${e.message}`);
      }
    }

    function startListening() {
      keepListening = true;
      restartCount = 0;
      fullTranscript = '';
      output.textContent = '(speak and your words will appear here)';
      log('--- Starting persistent listening ---');
      createAndStart();
    }

    function stopListening() {
      keepListening = false;
      if (recognition) {
        recognition.stop();
        log('Manually stopped');
      }
    }
  </script>
</body>
</html>
